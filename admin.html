<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | DEGROIDSK SQUAD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">DEGROIDSK</div>
            <nav class="nav">
                <a href="index.html" class="nav-link">← На сайт</a>
            </nav>
        </div>
        <div class="main-content">
            <h1>Админ-панель</h1>
            
            <div class="admin-tabs">
                <button onclick="showAdminTab('users')" class="tab-btn active">Пользователи</button>
                <button onclick="showAdminTab('verifications')" class="tab-btn">Верификация</button>
            </div>

            <!-- Управление пользователями -->
            <div id="usersTab" class="admin-tab active">
                <h2>Пользователи</h2>
                <div id="usersList"></div>
            </div>

            <!-- Заявки на верификацию -->
            <div id="verificationsTab" class="admin-tab">
                <h2>Заявки на верификацию</h2>
                <div id="verificationsList"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
