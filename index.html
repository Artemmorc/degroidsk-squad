<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGROIDSK SQUAD</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <span>DEGROIDSK</span>
            </div>
            
            <div class="nav">
                <a href="#" onclick="showSection('constitution')" class="nav-link active">
                    <i class="fas fa-book-open"></i>
                    <span>Конституция</span>
                </a>
            </div>

            <div class="edit-tools">
                <button id="editToggle" class="edit-btn" onclick="toggleEditMode()">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div id="constitution" class="section active">
                <div class="content-header">
                    <h1>
                        <i class="fas fa-scroll"></i>
                        Конституция DEGROIDSK SQUAD
                    </h1>
                    <div class="header-actions" id="adminActions" style="display: none;">
                        <button onclick="showAddForm()" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Новый раздел
                        </button>
                    </div>
                </div>

                <div class="sections-tree" id="sectionsList"></div>
                
                <div id="sectionForm" style="display: none;">
                    <!-- Форма редактирования -->
                    <h3 id="formTitle">Добавить раздел</h3>
                    <select id="parentSection" class="form-control"></select>
                    <input type="text" id="sectionTitle" placeholder="Название" class="form-control">
                    <textarea id="sectionContent" placeholder="Содержимое" rows="10" class="form-control"></textarea>
                    <button onclick="saveSection()" class="btn btn-success">Сохранить</button>
                    <button onclick="hideForm()" class="btn btn-danger">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
